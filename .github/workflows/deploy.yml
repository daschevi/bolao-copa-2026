# Deploy automático para GitHub Pages a cada push em main.
# Substitui o `npm run deploy` (gh-pages-cli + legacy Jekyll), que vinha
# travando em "building" sem completar. Builds via Actions são deterministas
# e usam o pipeline novo (build_type: workflow) que ignora Jekyll por padrão.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancela deploys em fila se um novo for disparado — evita race de versões.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build
        env:
          # Vite só inlina variáveis com prefixo VITE_ no bundle. Sem isso o
          # cliente Supabase é instanciado com URL/key vazios e isSupabaseConfigured
          # vira false ("Supabase não configurado." na tela de login).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
