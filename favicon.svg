<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo preto com borda verde Golfleet -->
  <circle cx="32" cy="32" r="32" fill="#0A0A0A"/>

  <!-- Bola de futebol -->
  <circle cx="32" cy="32" r="21" fill="#F5F5F5"/>

  <!-- Manchas da bola (pentágonos estilizados em preto) -->
  <polygon points="32,13 38.5,18 36,26 28,26 25.5,18" fill="#111111"/>
  <polygon points="32,13 25.5,18 19,13 21,6 32,5"    fill="#111111" opacity="0.7"/>
  <polygon points="32,13 38.5,18 45,13 43,6 32,5"    fill="#111111" opacity="0.7"/>
  <polygon points="25.5,18 19,13 12,19 14,27 23,27"  fill="#111111" opacity="0.7"/>
  <polygon points="38.5,18 45,13 52,19 50,27 41,27"  fill="#111111" opacity="0.7"/>
  <polygon points="28,26 14,27 15,36 24,40 32,35"    fill="#111111" opacity="0.7"/>
  <polygon points="36,26 50,27 49,36 40,40 32,35"    fill="#111111" opacity="0.7"/>
  <polygon points="32,35 24,40 26,49 32,51 38,49 40,40" fill="#111111" opacity="0.7"/>

  <!-- Anel verde Golfleet -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#22C55E" stroke-width="2"/>
  <!-- Halo externo suave -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.35"/>
</svg>
